spring.application.name=apoflow-backend
server.port=8080

# MongoDB Configuration
spring.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/apoflow}

# OAuth2 client auto-config is disabled until real client credentials are provided.
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.oauth2.client.servlet.OAuth2ClientAutoConfiguration

# JWT Configuration
jwt.secret=${JWT_SECRET:kP9#mX2!vL7$qZ4*bN1&fJ8@wR3%tY6_xC5}
jwt.expiration=86400000

# CORS Configuration
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost,http://localhost:3000,http://localhost:5173}
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true
cors.max-age=3600

# Application base URL (used in password-reset links)
app.base-url=${APP_BASE_URL:http://localhost:8080}

# Brevo configuration
brevo.token=${BREVO_TOKEN:}
brevo.from=${BREVO_FROM:apoflowmack@gmail.com}
app.email.enabled=${EMAIL_ENABLED:true}

