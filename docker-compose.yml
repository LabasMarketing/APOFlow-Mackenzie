services:
  mongodb:
    image: mongo:7.0
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  apoflow:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      - java
      - -Dspring.mongodb.uri=mongodb://mongodb:27017/apoflow
      - -jar
      - /app/app.jar
    restart: unless-stopped
    ports:
      - "80:8080"
    depends_on:
      - mongodb
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/apoflow
      - SPRING_MONGODB_URI=mongodb://mongodb:27017/apoflow
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost}
      - APP_CORS_ALLOWED_ORIGINS=${APP_CORS_ALLOWED_ORIGINS:-http://localhost,http://localhost:3000,http://localhost:5173}
      - EMAIL_ENABLED=true
      - BREVO_TOKEN=${BREVO_TOKEN}
      - BREVO_FROM=${BREVO_FROM}

volumes:
  mongo_data:
